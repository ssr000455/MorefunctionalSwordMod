name: Build Personal Edition

on:
  push:
    branches: [ personal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
      - name: Build
        run: gradle build
      - name: Rename artifact
        run: |
          VERSION=$(grep 'mod_version=' gradle.properties | cut -d'=' -f2)
          cp build/libs/mfswordmod-${VERSION}.jar build/libs/mfswordmod-${VERSION}-personal.jar
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mfswordmod-personal
          path: build/libs/*-personal.jar
